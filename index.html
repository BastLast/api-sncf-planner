<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Recherche de trains SNCF TGVmax - Trouvez les trains disponibles avec votre pass TGV">
    <title>Recherche de trains SNCF TGVmax</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container" role="main">
        <h1>Recherche de trains SNCF TGVmax</h1>
        <form id="searchForm" role="search" aria-label="Formulaire de recherche de trains">
            <div class="form-group">
                <label for="city">Gare de départ <span aria-hidden="true">*</span> :</label>
                <input 
                    list="stations" 
                    id="city" 
                    name="city" 
                    placeholder="Tapez une gare (auto-complétion)…" 
                    required 
                    aria-describedby="city-help"
                    autocomplete="off">
                <datalist id="stations"></datalist>
                <small id="city-help" class="form-help">Commencez à taper pour voir les suggestions</small>
            </div>
            
            <div class="form-group">
                <label for="date">Date <span aria-hidden="true">*</span> :</label>
                <input 
                    type="date" 
                    id="date" 
                    name="date" 
                    required 
                    aria-describedby="date-help"
                    min="">
                <small id="date-help" class="form-help">Sélectionnez une date à partir d'aujourd'hui</small>
            </div>
            
            <button type="submit" class="btn-primary">
                <span aria-hidden="true">🔍</span> Rechercher
            </button>
        </form>
        
        <div id="results" role="region" aria-live="polite" aria-label="Résultats de la recherche"></div>
    </main>

    <div id="map-panel" class="map-panel">
        <button id="map-toggle" class="map-toggle-btn" aria-label="Afficher/masquer la carte">
            🗺️ Carte
        </button>
        <div id="train-map" class="train-map"></div>
    </div>
    
    <script>
        // Définir la date minimale à aujourd'hui
        document.getElementById('date').min = new Date().toISOString().split('T')[0];
    </script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="./js/utils.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/map.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
